<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🚀</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Agility Process - Soluciones Tecnológicas Profesionales" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Agility Process - Soluciones Tecnológicas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@700&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; background: #0a0a0a; }
      #loading-screen {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #0a0a0a; color: #00d4ff; font-family: 'Inter', sans-serif;
        transition: opacity 0.5s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      .loader { width: 40px; height: 40px; border: 3px solid #1a1a1a; border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loader"></div>
      <span style="font-weight: 600; letter-spacing: 1px;">CARGANDO...</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.getElementById('loading-screen').classList.add('hidden');
        }, 300);
      });
    </script>
  </body>
</html>
